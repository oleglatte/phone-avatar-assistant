<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talking Avatar</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      color: #fff;
      background: radial-gradient(circle at top, #1f2a44, #0d1321 65%);
    }
    .app {
      width: min(100%, 520px);
      padding: 28px 22px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    .avatar-wrap {
      position: relative;
      width: 190px;
      height: 190px;
      margin: 0 auto 18px;
    }
    .avatar {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255,255,255,0.22);
      box-shadow: 0 0 0 0 rgba(110,168,254,.18);
      animation: idle 3.2s ease-in-out infinite;
    }
    .avatar-wrap.speaking { animation: speakFloat .42s ease-in-out infinite alternate; }
    .avatar-wrap.listening { animation: listenPulse 1.1s ease-in-out infinite; }
    .avatar-face {
      position: absolut20%;
      inset: 0;
      pointer-events: none;
    }
    .eyes {
      position: absolute;
      top: 38%;
      left: 50%;
      width: 40%;
      transform: translateX(-50%);
      display: flex;
      justify-content: space-between;
    }
    .eye {
      width: 16px;
      height: 10px;
      border-top: 3px solid #1d2433;
      border-radius: 50%;
      animation: blink 5s infinite;
    }
    .eye.right { animation-delay: 0.15s; }
    .mouth {
      position: absolute;
      left: 50%;
      top: 62%;
      width: 26px;
      height: 12px;
      transform: translateX(-50%);
      border-bottom: 4px solid #1d2433;
      border-radius: 0 0 30px 30px;
      opacity: 0.85;
    }
    .avatar-wrap.speaking .mouth { animation: talkMouth .16s infinite alternate; }
    .status {
      margin-bottom: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.82);
    }
    textarea {
      width: 100%;
      min-height: 120px;
      border: none;
      outline: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      line-height: 1.45;
      color: #111827;
      background: #f8fbff;
      margin-bottom: 14px;
    }
    .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    .speak-btn {
      background: #6ea8fe;
      color: #0d1321;
      box-shadow: 0 10px 25px rgba(110,168,254,.35);
    }
    .stop-btn {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }
    @keyframes idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes blink {
      0%, 45%, 48%, 100% { transform: scaleY(1); opacity: .95; }
      46%, 47% { transform: scaleY(0.15); opacity: .75; }
    }
    @keyframes talkMouth {
      from { transform: translateX(-50%) scaleY(.82); }
      to { transform: translateX(-50%) scaleY(1.22); }
    }
    @keyframes speakFloat {
      from { transform: translateY(0); }
      to { transform: translateY(-4px); }
    }
    @keyframes listenPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="avatar-wrap" id="avatarWrap">
      <img class="avatar" src="Avatar.png" alt="Avatar" />
      <div class="avatar-face">
        <div class="eyes">
          <span class="eye left"></span>
          <span class="eye right"></span>
        </div>
        <div class="mouth"></div>
      </div>
    </div>
    <div class="status" id="status">Готов говорить</div>
    <textarea id="text">Привет. Я твой аватар. Напиши сюда текст, и я озвучу его.</textarea>
    <div class="controls">
      <button class="speak-btn" id="speakBtn">Сказать</button>
      <button class="stop-btn" id="stopBtn">Стоп</button>
    </div>
  </main>

  <script>
    const synth = window.speechSynthesis;
    const avatarWrap = document.getElementById('avatarWrap');
    const status = document.getElementById('status');
    const text = document.getElementById('text');
    const speakBtn = document.getElementById('speakBtn');
    const stopBtn = document.getElementById('stopBtn');

    function setStatus(mode, text) {
      avatarWrap.classList.remove('speaking', 'listening');
      if (mode) avatarWrap.classList.add(mode);
      status.textContent = text;
    }

    function speak() {
      const value = text.value.trim();
      if (!value) { setStatus('', 'Сначала введи текст'); return; }
      if (!('speechSynthesis' in window)) { setStatus('', 'Браузер не поддерживает озвучку'); return; }
      synth.cancel();
      setStatus('listening', 'Готовлю озвучку...');
      const utterance = new SpeechSynthesisUtterance(value);
      utterance.lang = 'ru-RU';
      utterance.rate = 1;
      utterance.pitch = 1;
      utterance.onstart = () => { setStatus('speaking', 'Говорю...'); };
      utterance.onend = () => { setStatus('', 'Готов говорить'); };
      utterance.onerror = () => { setStatus('', 'Ошибка озвучки'); };
      synth.speak(utterance);
    }

    speakBtn.addEventListener('click', speak);
    stopBtn.addEventListener('click', () => { synth.cancel(); setStatus('', 'Готов говорить'); });
    window.addEventListener('beforeunload', () => synth.cancel());
  </script>
</body>
</html>
