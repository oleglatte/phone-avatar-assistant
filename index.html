<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#10131a" />
  <title>Phone Avatar Assistant</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #f5f7fb;
      --muted: #aab2c0;
      --accent: #6ea8fe;
      --accent-2: #8ef0c8;
      --border: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1a2030, var(--bg) 45%);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: 100%;
      max-width: 420px;
      background: rgba(23,26,33,.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }
    .avatar {
      width: 148px;
      height: 148px;
      margin: 8px auto 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      animation: float 3s ease-in-out infinite;
    }
    .avatar::before {
      content: "";
      width: 126px;
      height: 126px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 35%, #ffd8c2 0 28%, #f0b79c 29% 43%, #2a3145 44% 100%);
      opacity: .96;
    }
    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
    }
    p {
      margin: 0;
      text-align: center;
      color: var(--muted);
      line-height: 1.5;
    }
    .status {
      margin: 18px 0;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      text-align: center;
      font-size: 15px;
    }
    .controls {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      color: #08111f;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }
    .secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="avatar" aria-hidden="true"></div>
    <h1>Мой аватар-помощник</h1>
    <p>Первая мобильная версия. Следом добавим голос, ответы и живую анимацию.</p>
    <div class="status" id="status">Статус: приложение запущено на телефоне.</div>
    <div class="controls">
      <button id="speakBtn">Проверить голос</button>
      <button class="secondary" id="installBtn">Как установить на экран</button>
    </div>
    <div class="hint">Сейчас это стартовый экран MVP. Дальше мы добавим речь, анимацию губ и диалог.</div>
  </main>
  <script>
    const statusEl = document.getElementById('status');
    const speakBtn = document.getElementById('speakBtn');
    const installBtn = document.getElementById('installBtn');

    speakBtn.addEventListener('click', () => {
      const text = 'Привет. Я твой мобильный аватар помощник. Это первая тестовая версия.';
      statusEl.textContent = 'Статус: пробуем воспроизвести голос.';
      if ('speechSynthesis' in window) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ru-RU';
        utter.onend = () => statusEl.textContent = 'Статус: голос сработал.';
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utter);
      } else {
        statusEl.textContent = 'Статус: в этом браузере голос не поддерживается.';
      }
    });

    installBtn.addEventListener('click', () => {
      statusEl.textContent = 'Статус: на iPhone — Поделиться → На экран «Домой»; на Android — Меню браузера → Установить приложение.';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
