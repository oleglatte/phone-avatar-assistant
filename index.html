<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talking Avatar</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1f2a44, #0d1321 65%);
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .app {
      width: min(92vw, 520px);
      padding: 28px 22px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .avatar-wrap {
      position: relative;
      width: 190px;
      height: 190px;
      margin: 0 auto 18px;
    }

    .avatar {
      position: relative;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background-image: url('./Avatar.png');
      background-size: 85%;
      background-position: center 15%;
      background-repeat: no-repeat;
      background-color: #d9e8ff;
      border: 4px solid rgba(255,255,255,0.22);
      box-shadow: 0 0 0 0 rgba(110,168,254,.18);
      overflow: hidden;
      animation: idle 3.2s ease-in-out infinite;
      transition: filter 0.2s ease, box-shadow 0.2s ease;
    }

    .avatar-face {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .eyes {
      position: absolute;
      top: 40%;
      left: 50%;
      width: 42%;
      transform: translateX(-50%);
      display: flex;
      justify-content: space-between;
    }

    .eye {
      width: 18px;
      height: 10px;
      border-top: 3px solid #1d2433;
      border-radius: 50%;
      animation: blink 4.8s infinite;
      opacity: 0.9;
    }

    .eye.right {
      animation-delay: 0.15s;
    }

    .mouth {
      position: absolute;
      left: 50%;
      top: 64%;
      width: 28px;
      height: 12px;
      transform: translateX(-50%);
      border-bottom: 4px solid #1d2433;
      border-radius: 0 0 30px 30px;
      opacity: 0.85;
      transition: all 0.12s ease;
    }

    .status {
      min-height: 24px;
      margin-bottom: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.82);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: none;
      outline: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      line-height: 1.45;
      color: #111827;
      background: #f8fbff;
      margin-bottom: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, box-shadow .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .speak-btn {
      background: #6ea8fe;
      color: #0d1321;
      box-shadow: 0 10px 25px rgba(110,168,254,.35);
    }

    .stop-btn {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }

    .avatar.speaking {
      animation: speakGlow 0.9s ease-in-out infinite;
      filter: brightness(1.03);
    }

    .avatar.speaking + .avatar-face .mouth {
      width: 18px;
      height: 18px;
      border: 3px solid #1d2433;
      border-top: 2px solid #1d2433;
      border-radius: 50%;
      background: rgba(120, 0, 0, 0.08);
      animation: talkMouth 0.16s infinite alternate;
    }

    .avatar.speaking + .avatar-face {
      animation: faceBob 0.42s ease-in-out infinite alternate;
    }

    .avatar.listening {
      animation: pulse 1.1s ease-in-out infinite;
    }

    @keyframes idle {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @keyframes blink {
      0%, 45%, 48%, 100% {
        transform: scaleY(1);
        opacity: 0.95;
      }
      46%, 47% {
        transform: scaleY(0.15);
        opacity: 0.75;
      }
    }

    @keyframes talkMouth {
      from {
        transform: translateX(-50%) scaleY(0.8);
      }
      to {
        transform: translateX(-50%) scaleY(1.2);
      }
    }

    @keyframes faceBob {
      from {
        transform: translateY(0px);
      }
      to {
        transform: translateY(-2px);
      }
    }

    @keyframes speakGlow {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(110,168,254,.18);
      }
      50% {
        transform: scale(1.015);
        box-shadow: 0 0 24px 7px rgba(110,168,254,.30);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(110,168,254,.15);
      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 0 0 12px rgba(110,168,254,0);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="avatar-wrap">
      <div class="avatar" id="avatar"></div>
      <div class="avatar-face">
        <div class="eyes">
          <span class="eye left"></span>
          <span class="eye right"></span>
        </div>
        <div class="mouth"></div>
      </div>
    </div>

    <div class="status" id="status">Готов говорить</div>

    <textarea id="text">
Привет. Я твой аватар. Напиши сюда любой текст, и я озвучу его голосом.
    </textarea>

    <div class="controls">
      <button class="speak-btn" id="speakBtn">Сказать</button>
      <button class="stop-btn" id="stopBtn">Стоп</button>
    </div>
  </main>

  <script>
    const synth = window.speechSynthesis;
    const avatar = document.getElementById('avatar');
    const text = document.getElementById('text');
    const speakBtn = document.getElementById('speakBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');

    function setIdle() {
      avatar.classList.remove('speaking', 'listening');
      status.textContent = 'Готов говорить';
    }

    function speakText() {
      const value = text.value.trim();
      if (!value) {
        status.textContent = 'Введи текст для озвучки';
        return;
      }

      if (!('speechSynthesis' in window)) {
        status.textContent = 'Этот браузер не поддерживает озвучку';
        return;
      }

      synth.cancel();

      const utterance = new SpeechSynthesisUtterance(value);
      utterance.lang = 'ru-RU';
      utterance.rate = 1;
      utterance.pitch = 1;

      avatar.classList.remove('speaking');
      avatar.classList.add('listening');
      status.textContent = 'Готовлю озвучку...';

      utterance.onstart = () => {
        avatar.classList.remove('listening');
        avatar.classList.add('speaking');
        status.textContent = 'Говорю...';
      };

      utterance.onend = () => {
        setIdle();
      };

      utterance.onerror = () => {
        status.textContent = 'Ошибка озвучки';
        setIdle();
      };

      synth.speak(utterance);
    }

    speakBtn.addEventListener('click', speakText);

    stopBtn.addEventListener('click', () => {
      synth.cancel();
      setIdle();
    });

    window.addEventListener('beforeunload', () => {
      synth.cancel();
    });

    setIdle();
  </script>
</body>
</html>
